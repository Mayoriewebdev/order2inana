<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inana Food Company</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="order3.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">


</head>

<body>


    <section class="checkout-section">

    <div class="checkout-container">

        <!-- Logo -->
        <!-- <div class="logo" data-aos="fade-right" data-aos-delay="100">
            <a href="javascript:void(0)">
                <img src="images/Logo.png" alt="Inana Food">
            </a>
        </div> -->

        <!-- Steps -->
        <div class="steps">
            <div class="step">1</div>
            <div class="line"></div>
            <div class="step">2</div>
            <div class="line"></div>
            <div class="step active">3</div>
        </div>

        <!-- Title Image (replaces text) -->
        <div class="title">
            <img src="images/detials.png" class="title-img" alt="Your Details">
        </div>

        <!-- Form -->
        <form class="checkout-form">

            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name">

            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number">

            <label>Delivery Address</label>
            <input type="text" placeholder="Enter your full address">

        </form>

        <!-- Payment Summary Image (replaces price + delivery text) -->
        <div class="payment-summary">
            <img src="images/total amount.png" class="payment-img" alt="Payment Summary">
        </div>

        <!-- Pay Button -->
        <a href="#" class="pay-btn">
            <img src="images/Pay now.png" alt="Pay Now">
        </a>

    </div>

</section>





    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>





</body>

</html>
