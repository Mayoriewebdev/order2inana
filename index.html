<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inana Food Company</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">


</head>

<body>


    <section class="checkout-section">

    <div class="checkout-container">

        <!-- Steps -->
        <div class="steps" data-aos="fade-down" data-aos-duration="800">
            <div class="step" data-aos="zoom-in" data-aos-delay="100">1</div>
            <div class="line"></div>
            <div class="step" data-aos="zoom-in" data-aos-delay="200">2</div>
            <div class="line"></div>
            <div class="step active" data-aos="zoom-in" data-aos-delay="300">3</div>
        </div>

        <!-- Title Image -->
        <div class="title" data-aos="fade-up" data-aos-duration="800">
            <img src="images/detials.png" class="title-img" alt="Your Details">
        </div>

        <!-- Form -->
        <form class="checkout-form" data-aos="fade-up" data-aos-delay="150" data-aos-duration="900">

            <label data-aos="fade-right" data-aos-delay="200">Full Name</label>
            <input type="text" placeholder="Enter your full name" data-aos="fade-left" data-aos-delay="200">

            <label data-aos="fade-right" data-aos-delay="250">Phone Number</label>
            <input type="tel" placeholder="Enter your phone number" data-aos="fade-left" data-aos-delay="250">

            <label data-aos="fade-right" data-aos-delay="300">Delivery Address</label>
            <input type="text" placeholder="Enter your full address" data-aos="fade-left" data-aos-delay="300">

        </form>

        <!-- Payment Summary -->
        <div class="payment-summary" data-aos="zoom-in" data-aos-duration="900">
            <img src="images/total amount.png" class="payment-img" alt="Payment Summary">
        </div>

        <!-- Pay Button -->
        <a href="#" class="pay-btn" data-aos="fade-up" data-aos-delay="200">
            <img src="images/Pay now.png" alt="Pay Now">
        </a>

    </div>

</section>





    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>





</body>

</html>
